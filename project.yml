name: CratesIOS
options:
  bundleIdPrefix: co.crates.ios
  deploymentTarget:
    iOS: "26.0"
  developmentLanguage: en
  createIntermediateGroups: true

packages:
  ZIPFoundation:
    url: https://github.com/weichsel/ZIPFoundation.git
    from: "0.9.19"

settings:
  base:
    # Belt-and-braces against a broken generator on this machine: ~/.omlx/bin/xcodegen (first
    # in PATH) is missing its share/xcodegen/SettingPresets and silently emits a project with
    # NO default settings — PRODUCT_NAME resolves empty and the build dies with "Multiple
    # commands produce …/.app". Regenerate with /opt/homebrew/bin/xcodegen (intact presets);
    # these pins keep the standard defaults applied even if the broken binary runs by accident.
    PRODUCT_NAME: "$(TARGET_NAME)"
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    MARKETING_VERSION: "0.2.0"
    CURRENT_PROJECT_VERSION: "1"
    # Off so the build-stamp script can edit the built product's Info.plist. Every build gets a
    # unique CFBundleVersion (date/time) — with a static version+build the device install
    # service kept the previously installed binary, so the phone was stuck on old builds while
    # the simulator (which always replaces) got new ones.
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    GENERATE_INFOPLIST_FILE: YES
    # Automatic signing with Ellie's team so builds work on device + simulator.
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: C8N8X74Y27
  configs:
    Debug:
      # Standard Debug defaults made explicit: some toolchains don't auto-apply the config-name
      # defaults. Without them ONLY_ACTIVE_ARCH=NO pulls a second (x86_64) slice into the
      # concrete-simulator `test` build (which then fails to link the SPM packages), and
      # ENABLE_TESTABILITY=NO builds CratesIOS without `-enable-testing`, so the unit tests'
      # `@testable import CratesIOS` can't resolve a compatible module; and the missing `-Onone`
      # default optimizes the app, inlining/stripping symbols (e.g. KeychainStore) that
      # `@testable` linking then can't find.
      ONLY_ACTIVE_ARCH: YES
      ENABLE_TESTABILITY: YES
      SWIFT_OPTIMIZATION_LEVEL: "-Onone"
      GCC_OPTIMIZATION_LEVEL: "0"
      DEAD_CODE_STRIPPING: NO
      COPY_PHASE_STRIP: NO
      # The Xcode 16 debug-dylib splits the app into a tiny launcher stub + a `.debug.dylib`
      # holding the real symbols. Hosted unit tests then link against the stub with no
      # `-bundle_loader` to the dylib, so every `@testable` symbol goes undefined. Build the app
      # as a single binary so the test host resolves against it normally.
      ENABLE_DEBUG_DYLIB: NO

targets:
  CratesIOS:
    type: application
    platform: iOS
    sources:
      - path: Sources
      - path: Resources
    dependencies:
      - package: ZIPFoundation
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: co.crates.ios.app
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        INFOPLIST_KEY_UIBackgroundModes: audio
        INFOPLIST_KEY_NSAppTransportSecurity: ""
    info:
      path: Resources/Info.plist
      properties:
        UIBackgroundModes:
          - audio
        NSLocalNetworkUsageDescription: "Crates needs to find and connect to your Crates server on your local network."
        NSBonjourServices:
          - _http._tcp
        # The Crates server is HTTP-only. NSAllowsLocalNetworking exempts cleartext to hosts iOS
        # treats as "local" (RFC1918 IPs, *.local). But the server is often reached over Tailscale:
        # a 100.64.0.0/10 CGNAT IP or a *.ts.net MagicDNS name — NEITHER counts as local, so ATS
        # blocks it. Tailscale tunnels are WireGuard-encrypted end to end, so we allow cleartext to
        # arbitrary hosts (personal, non-App-Store build against a user-supplied server). ts.net is
        # also called out explicitly so MagicDNS keeps working even if arbitrary loads is tightened.
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
          NSAllowsArbitraryLoads: true
          NSExceptionDomains:
            ts.net:
              NSIncludesSubdomains: true
              NSExceptionAllowsInsecureHTTPLoads: true
    postBuildScripts:
      - name: Stamp build number
        basedOnDependencyAnalysis: false
        script: |
          # Unique CFBundleVersion per build so device installs always replace the old binary.
          INFOPLIST="${TARGET_BUILD_DIR}/${INFOPLIST_PATH}"
          if [ -f "$INFOPLIST" ]; then
            /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $(date +%Y%m%d.%H%M%S)" "$INFOPLIST"
          fi

  CratesTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests/CratesTests
    dependencies:
      - target: CratesIOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: co.crates.ios.tests
        GENERATE_INFOPLIST_FILE: YES
        # xcodegen sets TEST_HOST but relies on Xcode defaulting BUNDLE_LOADER = $(TEST_HOST).
        # This toolchain doesn't apply that default, so the test link gets no `-bundle_loader`
        # and every `@testable import CratesIOS` symbol goes undefined. Wire it explicitly.
        BUNDLE_LOADER: "$(TEST_HOST)"

  CratesUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: Tests/CratesUITests
    dependencies:
      - target: CratesIOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: co.crates.ios.uitests
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: CratesIOS

# Explicit scheme so `test` always runs both bundles. The auto-generated scheme on this
# toolchain wired only the UI-test target into its test action, silently skipping the unit tests.
schemes:
  CratesIOS:
    build:
      targets:
        CratesIOS: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - CratesTests
        - CratesUITests

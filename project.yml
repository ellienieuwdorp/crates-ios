name: CratesIOS
options:
  bundleIdPrefix: co.crates.ios
  deploymentTarget:
    iOS: "26.0"
  developmentLanguage: en
  createIntermediateGroups: true

packages:
  ZIPFoundation:
    url: https://github.com/weichsel/ZIPFoundation.git
    from: "0.9.19"

settings:
  base:
    # Belt-and-braces against a broken generator on this machine: ~/.omlx/bin/xcodegen (first
    # in PATH) is missing its share/xcodegen/SettingPresets and silently emits a project with
    # NO default settings — PRODUCT_NAME resolves empty and the build dies with "Multiple
    # commands produce …/.app". Regenerate with /opt/homebrew/bin/xcodegen (intact presets);
    # this pin keeps the product named even if the broken binary is used by accident.
    PRODUCT_NAME: "$(TARGET_NAME)"
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    MARKETING_VERSION: "0.2.0"
    CURRENT_PROJECT_VERSION: "1"
    # Off so the build-stamp script can edit the built product's Info.plist. Every build gets a
    # unique CFBundleVersion (date/time) — with a static version+build the device install
    # service kept the previously installed binary, so the phone was stuck on old builds while
    # the simulator (which always replaces) got new ones.
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    GENERATE_INFOPLIST_FILE: YES
    # Automatic signing with Ellie's team so builds work on device + simulator.
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: C8N8X74Y27
  configs:
    Debug:
      # Simulator test runs must not fan out to x86_64: the SPM ZIPFoundation product only
      # builds for the active arch, so a universal Debug link dies on missing x86_64 symbols.
      # (Also in the Debug preset — pinned for the same broken-generator reason as above.)
      ONLY_ACTIVE_ARCH: YES

# Explicit shared scheme: the implicit scheme stopped including the unit-test bundle (only
# CratesUITests ran), silently skipping the whole CratesTests suite on `xcodebuild test`.
schemes:
  CratesIOS:
    build:
      targets:
        CratesIOS: all
    run:
      config: Debug
    test:
      config: Debug
      gatherCoverageData: false
      targets:
        - CratesTests
        - CratesUITests

targets:
  CratesIOS:
    type: application
    platform: iOS
    sources:
      - path: Sources
      - path: Resources
    dependencies:
      - package: ZIPFoundation
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: co.crates.ios.app
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        INFOPLIST_KEY_UIBackgroundModes: audio
        INFOPLIST_KEY_NSAppTransportSecurity: ""
    info:
      path: Resources/Info.plist
      properties:
        UIBackgroundModes:
          - audio
        NSLocalNetworkUsageDescription: "Crates needs to find and connect to your Crates server on your local network."
        NSBonjourServices:
          - _http._tcp
        # The Crates server is HTTP-only. NSAllowsLocalNetworking exempts cleartext to hosts iOS
        # treats as "local" (RFC1918 IPs, *.local). But the server is often reached over Tailscale:
        # a 100.64.0.0/10 CGNAT IP or a *.ts.net MagicDNS name — NEITHER counts as local, so ATS
        # blocks it. Tailscale tunnels are WireGuard-encrypted end to end, so we allow cleartext to
        # arbitrary hosts (personal, non-App-Store build against a user-supplied server). ts.net is
        # also called out explicitly so MagicDNS keeps working even if arbitrary loads is tightened.
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
          NSAllowsArbitraryLoads: true
          NSExceptionDomains:
            ts.net:
              NSIncludesSubdomains: true
              NSExceptionAllowsInsecureHTTPLoads: true
    postBuildScripts:
      - name: Stamp build number
        basedOnDependencyAnalysis: false
        script: |
          # Unique CFBundleVersion per build so device installs always replace the old binary.
          INFOPLIST="${TARGET_BUILD_DIR}/${INFOPLIST_PATH}"
          if [ -f "$INFOPLIST" ]; then
            /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $(date +%Y%m%d.%H%M%S)" "$INFOPLIST"
          fi

  CratesTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests/CratesTests
    dependencies:
      - target: CratesIOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: co.crates.ios.tests
        GENERATE_INFOPLIST_FILE: YES

  CratesUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: Tests/CratesUITests
    dependencies:
      - target: CratesIOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: co.crates.ios.uitests
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: CratesIOS
